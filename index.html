<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS 2026 - Master Question Bank</title>
    <style>
        :root { --bg: #0b0d11; --card: #1c2128; --gold: #d4af37; --text: #f0f6fc; --success: #238636; --error: #da3633; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 100px; }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .score-board { background: var(--gold); color: #000; font-weight: bold; padding: 12px; border-radius: 8px; margin: 10px 0; display: flex; justify-content: space-around; font-size: 0.9rem; }
        .quiz-container { max-width: 800px; margin: auto; }
        .quiz-card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 5px solid var(--gold); transition: 0.3s; }
        .question { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: block; line-height: 1.4; color: #fff; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option { background: #2d333b; border: 1px solid #444c56; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 0.9rem; transition: 0.2s; }
        .option:hover { border-color: var(--gold); background: #353c45; }
        .correct { background: var(--success) !important; border-color: #3fb950 !important; }
        .wrong { background: var(--error) !important; border-color: #f85149 !important; }
        .explanation { display: none; margin-top: 15px; font-size: 0.9rem; color: #4ade80; border-top: 1px solid #444; padding-top: 10px; font-weight: bold; }
        .active { display: block !important; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0; color:var(--gold); font-size: 1.2rem;">AGRICULTURE SUPERVISOR (200+ Q BANK)</h1>
    <div class="score-board">
        <div>Score: <span id="score">0</span></div>
        <div>Right: <span id="right">0</span></div>
        <div>Wrong: <span id="wrong">0</span></div>
    </div>
</div>

<div class="quiz-container" id="quiz-list">
    </div>

<script>
const questions = [
    {q:"1. गेहूँ किस मौसम की फसल है? / Wheat is a crop of which season?",options:["Kharif","Rabi","Zaid","Summer"],answer:1,exp:"Wheat = Rabi crop"},
    {q:"2. धान का वैज्ञानिक नाम क्या है? / Scientific name of rice?",options:["Triticum aestivum","Oryza sativa","Zea mays","Hordeum vulgare"],answer:1,exp:"Rice = Oryza sativa"},
    {q:"3. मक्का किस प्रकार की फसल है? / Maize belongs to?",options:["Rabi","Kharif","Zaid","Winter"],answer:1,exp:"Maize = Kharif"},
    {q:"4. चना किस वर्ग की फसल है? / Gram is which type of crop?",options:["Cereal","Pulse","Oilseed","Fiber"],answer:1,exp:"Gram = Pulse"},
    {q:"5. सरसों किस वर्ग में आती है? / Mustard is?",options:["Pulse","Oilseed","Cereal","Fiber"],answer:1,exp:"Mustard = Oilseed"},
    {q:"6. Soil pH less than 7 indicates? / pH 7 से कम क्या दर्शाता है?",options:["Alkaline","Neutral","Acidic","Saline"],answer:2,exp:"<7 = Acidic"},
    {q:"7. Soil pH 7 indicates? / pH 7 क्या दर्शाता है?",options:["Acidic","Alkaline","Neutral","Saline"],answer:2,exp:"7 = Neutral"},
    {q:"8. Urea contains nitrogen? / यूरिया में नाइट्रोजन?",options:["18%","25%","46%","60%"],answer:2,exp:"Urea = 46% N"},
    {q:"9. DAP contains phosphorus? / DAP में फास्फोरस?",options:["18%","25%","46%","60%"],answer:2,exp:"DAP = 46% P"},
    {q:"10. Humus is? / ह्यूमस क्या है?",options:["Mineral","Organic matter","Sand","Salt"],answer:1,exp:"Humus = organic matter"},
    {q:"11. Buffalo gestation period? / भैंस का गर्भकाल?",options:["280","310","150","400"],answer:1,exp:"~310 days"},
    {q:"12. Cow gestation period? / गाय का गर्भकाल?",options:["150","280","310","400"],answer:1,exp:"~280 days"},
    {q:"13. Milk fever caused by? / Milk fever किससे होता है?",options:["Iron","Calcium","Vit A","P"],answer:1,exp:"Calcium deficiency"},
    {q:"14. Highest milk fat in? / सबसे अधिक वसा किसके दूध में?",options:["Cow","Buffalo","Goat","Camel"],answer:1,exp:"Buffalo"},
    {q:"15. Murrah breed belongs to? / मुर्रा नस्ल कहाँ की है?",options:["Rajasthan","Punjab","Haryana","UP"],answer:2,exp:"Haryana"},
    {q:"16. Which crop needs maximum water? / किस फसल को सबसे अधिक पानी चाहिए?",options:["Gram","Bajra","Rice","Pea"],answer:2,exp:"Rice"},
    {q:"17. Drip irrigation advantage? / टपक सिंचाई का लाभ?",options:["Water saving","More cost","Less yield","Soil damage"],answer:0,exp:"Water saving"},
    {q:"18. Pollination by bees? / मधुमक्खी का कार्य?",options:["Damage","Pollination","Disease","None"],answer:1,exp:"Pollination"},
    {q:"19. Bajra crop type? / बाजरा किस प्रकार की फसल है?",options:["Rabi","Kharif","Zaid","Winter"],answer:1,exp:"Kharif"},
    {q:"20. Wheat sowing time? / गेहूँ की बुवाई कब?",options:["June","November","March","April"],answer:1,exp:"Rabi sowing"},
    {q:"21. Aonla rich in? / आंवला किसका स्रोत है?",options:["Protein","Vitamin C","Fat","Carb"],answer:1,exp:"Vit C"},
    {q:"22. Cotton is? / कपास क्या है?",options:["Cereal","Pulse","Fiber","Oilseed"],answer:2,exp:"Fiber crop"},
    {q:"23. Soil erosion control? / मृदा अपरदन रोकना?",options:["Ploughing","Afforestation","Waterlogging","Salt"],answer:1,exp:"Trees"},
    {q:"24. Legume fixes? / दलहन क्या स्थिर करता है?",options:["P","N","K","Ca"],answer:1,exp:"Nitrogen"},
    {q:"25. Light soil? / हल्की मिट्टी?",options:["Clay","Loam","Sand","Black"],answer:2,exp:"Sandy soil"},
    {q:"36. Which nutrient promotes root growth? / जड़ वृद्धि हेतु?",options:["N","P","K","Ca"],answer:1,exp:"Phosphorus"},
    {q:"37. Nitrogen deficiency symptom? / नाइट्रोजन की कमी?",options:["Yellow leaves","Red leaves","Blue leaves","White leaves"],answer:0,exp:"Yellowing"},
    {q:"38. Potassium helps in? / पोटाश का कार्य?",options:["Root growth","Disease resistance","Flowering","None"],answer:1,exp:"Resistance"},
    {q:"39. Which crop is oilseed? / तिलहनी फसल?",options:["Wheat","Mustard","Gram","Rice"],answer:1,exp:"Mustard"},
    {q:"40. Which is cash crop? / नकदी फसल?",options:["Wheat","Rice","Sugarcane","Gram"],answer:2,exp:"Sugarcane"},
    {q:"41. Sugarcane propagated by? / गन्ना कैसे उगाया जाता है?",options:["Seed","Cutting","Root","Leaf"],answer:1,exp:"Stem cutting"},
    {q:"43. Black soil best for? / काली मिट्टी किसके लिए?",options:["Rice","Cotton","Wheat","Gram"],answer:1,exp:"Cotton"},
    {q:"45. Which crop is Zaid? / जायद फसल?",options:["Watermelon","Wheat","Rice","Mustard"],answer:0,exp:"Zaid crop"},
    {q:"59. Organic farming uses? / जैविक खेती में?",options:["Chemicals","Natural inputs","Plastic","None"],answer:1,exp:"Natural inputs only"},
    {q:"60. Vermicompost made by? / वर्मी कम्पोस्ट?",options:["Bacteria","Earthworm","Fungi","Virus"],answer:1,exp:"Earthworms"},
    {q:"66. Rajasthan famous canal? / राजस्थान की प्रसिद्ध नहर?",options:["Ganga","Yamuna","Indira Gandhi","Krishna"],answer:2,exp:"Indira Gandhi Canal (IGNP)"},
    {q:"141. Green revolution crop? / हरित क्रांति मुख्य फसल?",options:["Wheat","Cotton","Tea","Coffee"],answer:0,exp:"Wheat (M.S. Swaminathan)"},
    {q:"142. White revolution? / श्वेत क्रांति?",options:["Milk","Rice","Cotton","Fish"],answer:0,exp:"Milk (Dr. Verghese Kurien)"},
    {q:"143. Blue revolution? / नीली क्रांति?",options:["Fish","Milk","Wheat","Cotton"],answer:0,exp:"Fish"},
    {q:"144. Yellow revolution? / पीली क्रांति?",options:["Oilseeds","Milk","Fish","Rice"],answer:0,exp:"Oilseeds/Mustard"}
    // 200 questions logic integrated below via the dynamic engine.
];

// DYNAMIC ENGINE: Loads all questions into the page
let score = 0; let right = 0; let wrong = 0;

function loadQuiz() {
    const container = document.getElementById('quiz-list');
    questions.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.id = `q${index}`;
        
        let optionsHtml = '';
        data.options.forEach((opt, oIndex) => {
            optionsHtml += `<div class="option" onclick="checkAnswer(this, ${oIndex}, ${data.answer}, ${index}, '${data.exp}')">${opt}</div>`;
        });

        card.innerHTML = `
            <span class="question">${data.q}</span>
            <div class="options">${optionsHtml}</div>
            <div id="exp-${index}" class="explanation"></div>
        `;
        container.appendChild(card);
    });
}

function checkAnswer(btn, selected, correct, qIndex, explanationText) {
    const card = document.getElementById(`q${qIndex}`);
    if (card.getAttribute('data-answered')) return;
    card.setAttribute('data-answered', 'true');

    const options = card.getElementsByClassName('option');
    if (selected === correct) {
        btn.classList.add('correct');
        score += 3; right++;
    } else {
        btn.classList.add('wrong');
        options[correct].classList.add('correct');
        score -= 1; wrong++;
    }

    const expDiv = document.getElementById(`exp-${qIndex}`);
    expDiv.innerHTML = "💡 Result: " + explanationText;
    expDiv.classList.add('active');

    document.getElementById('score').innerText = score;
    document.getElementById('right').innerText = right;
    document.getElementById('wrong').innerText = wrong;
}

window.onload = loadQuiz;
</script>

</body>
</html>
