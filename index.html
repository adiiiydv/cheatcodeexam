<html lang="hi">

    <style>
        :root { --bg: #0b0d11; --card: #1c2128; --gold: #d4af37; --text: #f0f6fc; --success: #238636; --error: #da3633; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; padding-bottom: 100px; }
        .header { text-align: center; padding: 15px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .score-board { background: var(--gold); color: #000; font-weight: bold; padding: 12px; border-radius: 8px; margin: 10px 0; display: flex; justify-content: space-around; font-size: 0.9rem; }
        .quiz-container { max-width: 800px; margin: auto; }
        .quiz-card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 5px solid var(--gold); }
        .question { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; display: block; line-height: 1.4; color: #fff; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option { background: #2d333b; border: 1px solid #444c56; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 0.9rem; transition: 0.2s; }
        .option:hover { border-color: var(--gold); background: #353c45; }
        .correct { background: var(--success) !important; border-color: #3fb950 !important; }
        .wrong { background: var(--error) !important; border-color: #f85149 !important; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
    </style>

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

const questions = rawData.map(item => ({
    q: item.q,
    options: item.options,
    correctText: item.options[item.answer]
}));

let score = 0, right = 0, wrong = 0;

function loadQuiz() {
    const container = document.getElementById('quiz-list');
    shuffle(questions); 

    questions.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.id = `q${index}`;

        let shuffledOptions = [...data.options];
        shuffle(shuffledOptions); 

        let optionsHtml = '';
        shuffledOptions.forEach(opt => {
            const isCorrect = (opt === data.correctText);
            optionsHtml += `<div class="option" onclick="checkAnswer(this, ${isCorrect}, ${index})">${opt}</div>`;
        });

        card.innerHTML = `<span class="question">${data.q}</span><div class="options">${optionsHtml}</div>`;
        container.appendChild(card);
    });
}

function checkAnswer(btn, isCorrect, qIndex) {
    const card = document.getElementById(`q${qIndex}`);
    if (card.getAttribute('data-answered')) return;
    card.setAttribute('data-answered', 'true');

    if (isCorrect) {
        btn.classList.add('correct');
        score += 3; right++;
    } else {
        btn.classList.add('wrong');
        const opts = card.getElementsByClassName('option');
        for(let opt of opts) {
            if(opt.innerText === questions[qIndex].correctText) opt.classList.add('correct');
        }
        score -= 1; wrong++;
    }

    document.getElementById('score').innerText = score;
    document.getElementById('right').innerText = right;
    document.getElementById('wrong').innerText = wrong;
}

window.onload = loadQuiz;
