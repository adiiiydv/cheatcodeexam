// Verify each question points to its correct option string
const questions = rawData.map(item => ({
    q: item.q,
    options: item.options,
    correctText: item.options[item.answer]
}));

let score = 0, rightCount = 0;

function loadQuiz() {
    const list = document.getElementById('quiz-list');
    document.getElementById('total-q').innerText = questions.length;
    
    questions.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.id = `q${index}`;

        let optionsHtml = '';
        data.options.forEach(opt => {
            const isCorrect = (opt === data.correctText);
            optionsHtml += `<div class="option" onclick="handleSelect(this, ${isCorrect}, ${index})">${opt}</div>`;
        });

        card.innerHTML = `<span class="question">${data.q}</span><div class="options">${optionsHtml}</div>`;
        list.appendChild(card);
    });
}

function handleSelect(btn, isCorrect, qIdx) {
    const card = document.getElementById(`q${qIdx}`);
    if (card.getAttribute('data-done')) return;
    card.setAttribute('data-done', 'true');

    if (isCorrect) {
        btn.classList.add('correct');
        score += 3; rightCount++;
    } else {
        btn.classList.add('wrong');
        const opts = card.getElementsByClassName('option');
        for (let o of opts) {
            if (o.innerText === questions[qIdx].correctText) o.classList.add('correct');
        }
        score -= 1;
    }
    document.getElementById('score').innerText = score;
    document.getElementById('right').innerText = rightCount;
}

window.onload = loadQuiz;
</script>
