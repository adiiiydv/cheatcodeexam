<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS 2026 - Mega Mock</title>

<style>
:root { --bg:#0b0d11; --card:#1c2128; --gold:#d4af37; --text:#f0f6fc; --success:#238636; --error:#da3633; }
body { font-family:'Segoe UI'; background:var(--bg); color:var(--text); margin:0; padding:10px; }
.header { text-align:center; border-bottom:2px solid var(--gold); padding:10px; }
.score-board { background:var(--gold); color:#000; padding:10px; display:flex; justify-content:space-around; border-radius:8px; }
.quiz-card { background:var(--card); padding:15px; margin:10px 0; border-radius:10px; border-left:4px solid var(--gold); }
.option { background:#2d333b; margin:5px; padding:8px; border-radius:6px; cursor:pointer; }
.correct { background:var(--success)!important; }
.wrong { background:var(--error)!important; }
.explanation { display:none; margin-top:5px; color:#4ade80; }
.active { display:block; }
</style>
</head>

<body>

<div class="header">
<h2>AGRI SUPERVISOR 2026</h2>
<div class="score-board">
<span>Score: <span id="score">0</span></span>
<span>Right: <span id="right">0</span></span>
<span>Wrong: <span id="wrong">0</span></span>
</div>
</div>

<div id="quiz"></div>

<script>

let score = 0, right = 0, wrong = 0;

// 🔥 QUESTION BANK (ADD UP TO 300 HERE)
const questions = [
{
q:"अनाजों का राजा किसे कहा जाता है?",
options:["गेहूँ","मक्का","धान","बाजरा"],
answer:0,
exp:"गेहूँ को King of cereals कहा जाता है"
},
{
q:"बाजरा का उद्गम कहाँ है?",
options:["भारत","अफ्रीका","चीन","ब्राज़ील"],
answer:1,
exp:"बाजरा का origin Africa है"
},
{
q:"सबसे अधिक नाइट्रोजन किसमें?",
options:["यूरिया","अमोनिया","DAP","CAN"],
answer:1,
exp:"Anhydrous Ammonia में ~82% N होता है"
},
{
q:"Milk fever किसकी कमी से होता है?",
options:["Iron","Calcium","Vit A","P"],
answer:1,
exp:"Calcium deficiency"
},
{
q:"भैंस की गर्भ अवधि?",
options:["282","310","150","400"],
answer:1,
exp:"~310 days"
}
];

// 🔥 AUTO GENERATE (YOU CAN SCALE TO 300)
const quiz = document.getElementById("quiz");

questions.forEach((q, index) => {

let card = document.createElement("div");
card.className = "quiz-card";

let html = `<b>${index+1}. ${q.q}</b>`;

q.options.forEach((opt,i)=>{
html += `<div class="option" onclick="check(this,${index},${i})">${opt}</div>`;
});

html += `<div id="exp${index}" class="explanation"></div>`;

card.innerHTML = html;
quiz.appendChild(card);

});

function check(el,qIndex,optIndex){

let card = el.parentElement;
if(card.dataset.done) return;
card.dataset.done = true;

let q = questions[qIndex];

let options = card.querySelectorAll(".option");

options[q.answer].classList.add("correct");

if(optIndex === q.answer){
el.classList.add("correct");
score+=3; right++;
}else{
el.classList.add("wrong");
score-=1; wrong++;
}

let exp = document.getElementById("exp"+qIndex);
exp.innerText = "💡 "+q.exp;
exp.classList.add("active");

document.getElementById("score").innerText = score;
document.getElementById("right").innerText = right;
document.getElementById("wrong").innerText = wrong;
}

</script>

</body>
</html>
