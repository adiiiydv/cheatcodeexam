        .correct { background: var(--success) !important; border-color: #3fb950 !important; }

        .explanation { display: none; margin-top: 15px; font-size: 0.9rem; color: #4ade80; border-top: 1px solid #444; padding-top: 10px; font-weight: bold; }

let score = 0; let right = 0; let wrong = 0;

function loadQuiz() {
    const container = document.getElementById('quiz-list');
    questions.forEach((data, index) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.id = `q${index}`;
        let optionsHtml = '';
        data.options.forEach((opt, oIndex) => {
            optionsHtml += `<div class="option" onclick="checkAnswer(this, ${oIndex}, ${data.answer}, ${index}, '${data.exp}')">${opt}</div>`;
        });
        card.innerHTML = `<span class="question">${data.q}</span><div class="options">${optionsHtml}</div><div id="exp-${index}" class="explanation"></div>`;
        container.appendChild(card);
    });
}

function checkAnswer(btn, selected, correct, qIndex, exp) {
    const card = document.getElementById(`q${qIndex}`);
    if (card.getAttribute('data-answered')) return;
    card.setAttribute('data-answered', 'true');
    const opts = card.getElementsByClassName('option');
    if (selected === correct) {
        btn.classList.add('correct'); score += 3; right++;
    } else {
        btn.classList.add('wrong'); opts[correct].classList.add('correct'); score -= 1; wrong++;
    }
    const d = document.getElementById(`exp-${qIndex}`);
    d.innerHTML = "💡 Result: " + exp; d.classList.add('active');
    document.getElementById('score').innerText = score;
    document.getElementById('right').innerText = right;
    document.getElementById('wrong').innerText = wrong;
}
window.onload = loadQuiz;
</script>
