<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS 2026 Auto 300 Quiz</title>

<style>
body { font-family:Arial; background:#0b0d11; color:#fff; padding:10px; }
.quiz-card { background:#1c2128; margin:10px 0; padding:10px; border-radius:8px; }
.option { background:#2d333b; margin:5px; padding:8px; cursor:pointer; border-radius:5px; }
.correct { background:green !important; }
.wrong { background:red !important; }
</style>
</head>

<body>

<h2>AGRI SUPERVISOR AUTO 300 TEST</h2>
<div>Score: <span id="score">0</span></div>

<div id="quiz"></div>

<script>

let score = 0;

// 🔥 BASE QUESTION POOL (SYSTEM WILL REPEAT + MODIFY)
const baseQuestions = [
{ q:"गेहूँ किस मौसम की फसल है?", a:"रबी", w:["खरीफ","जायद","कोई नहीं"] },
{ q:"धान किस मौसम की फसल है?", a:"खरीफ", w:["रबी","जायद","सर्दी"] },
{ q:"यूरिया में N कितना % होता है?", a:"46%", w:["18%","82%","25%"] },
{ q:"भैंस का गर्भकाल?", a:"310 दिन", w:["200","150","400"] },
{ q:"Milk fever किसकी कमी से?", a:"Calcium", w:["Iron","Vit A","P"] }
];

// 🔥 SHUFFLE FUNCTION
function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

// 🔥 GENERATE 300 QUESTIONS
let questions = [];

for(let i=0;i<300;i++){

let base = baseQuestions[i % baseQuestions.length];

let options = [base.a, ...base.w];
options = shuffle(options);

questions.push({
q:(i+1)+". "+base.q,
options:options,
answer:options.indexOf(base.a),
exp:base.a+" सही उत्तर है"
});
}

// 🔥 RENDER
const quiz = document.getElementById("quiz");

questions.forEach((q,i)=>{

let div = document.createElement("div");
div.className="quiz-card";

let html = `<b>${q.q}</b>`;

q.options.forEach((opt,j)=>{
html += `<div class="option" onclick="check(this,${i},${j})">${opt}</div>`;
});

html += `<div id="exp${i}" style="display:none;">💡 ${q.exp}</div>`;

div.innerHTML = html;
quiz.appendChild(div);

});

// 🔥 CHECK FUNCTION
function check(el,qIndex,optIndex){

let parent = el.parentElement;
if(parent.dataset.done) return;
parent.dataset.done=true;

let q = questions[qIndex];
let options = parent.querySelectorAll(".option");

options[q.answer].classList.add("correct");

if(optIndex===q.answer){
el.classList.add("correct");
score+=3;
}else{
el.classList.add("wrong");
score-=1;
}

document.getElementById("score").innerText=score;

document.getElementById("exp"+qIndex).style.display="block";
}

</script>

</body>
</html>
